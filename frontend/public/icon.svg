<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7b2dff"/>
      <stop offset="100%" style="stop-color:#ff00aa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" filter="url(#glow)"/>
  
  <!-- Dolphin silhouette -->
  <g transform="translate(256, 256) scale(1.8) translate(-50, -50)">
    <!-- Main body -->
    <path d="M 25 45 
             Q 30 35, 50 30
             Q 70 25, 80 30
             Q 95 35, 95 45
             Q 95 55, 80 60
             Q 60 68, 40 65
             Q 20 62, 25 45 Z
             fill="white"/>
    <!-- Snout -->
    <path d="M 80 45
             Q 90 42, 95 45
             Q 90 48, 80 45 Z
             fill="white"/>
    <!-- Dorsal fin -->
    <path d="M 50 30
             Q 55 15, 60 30
             Z
             fill="white"/>
    <!-- Tail flukes -->
    <path d="M 25 45
             Q 10 35, 5 45
             Q 10 50, 20 50
             Q 15 55, 5 55
             Q 10 65, 25 55
             Z
             fill="white"/>
    <!-- Pectoral fin -->
    <path d="M 55 55
             Q 50 70, 60 65
             Q 65 60, 55 55 Z
             fill="white"/>
  </g>
  
  <!-- Sparkle effects -->
  <g fill="white" opacity="0.9">
    <circle cx="400" cy="100" r="8"/>
    <circle cx="420" cy="130" r="5"/>
    <circle cx="380" cy="140" r="6"/>
    <circle cx="100" cy="380" r="7"/>
    <circle cx="130" cy="410" r="5"/>
    <circle cx="80" cy="360" r="4"/>
  </g>
  
  <!-- AI circuit lines -->
  <g stroke="white" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50 256 L 100 256 L 120 236 L 150 236"/>
    <path d="M 462 256 L 412 256 L 392 276 L 362 276"/>
    <path d="M 256 50 L 256 100 L 276 120 L 276 150"/>
    <path d="M 256 462 L 256 412 L 236 392 L 236 362"/>
  </g>
</svg>
